<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>📈 실시간 주식 보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070d1a;color:#e2e8f0;font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#070d1a}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ══ 헤더 ══ */
#hdr{
  height:34px;display:flex;align-items:center;gap:10px;
  padding:0 12px;background:#0c1525;border-bottom:1px solid #1e293b;flex-shrink:0;
}
.logo{font-weight:800;font-size:14px;letter-spacing:-.5px}
.badge{font-size:10px;font-weight:700;color:#00d97e;background:#00d97e15;border:1px solid #00d97e30;border-radius:20px;padding:1px 8px}
.ts{font-size:10px;color:#b8ccd8;margin-left:auto}

/* ══ 메인 레이아웃 ══
   섹터A(350) + 섹터B(350) + 포착(420) + 알람(400) + 랭킹(400) = 1920px
══════════════════════════════════════════════ */
#main{
  display:grid;
  /* 섹터A(350) + 섹터B(350) + 포착(480) + 알람(340) + 랭킹(400) = 1920px */
  grid-template-columns: 350px 350px 480px 340px 400px;
  height:calc(100vh - 34px);
  overflow:hidden;
}

/* ══ 공통 컬럼 스타일 ══ */
.col{display:flex;flex-direction:column;border-right:1px solid #1e293b;overflow:hidden}
.col:last-child{border-right:none}

/* 컬럼 최상단 타이틀바 */
.col-title{
  height:28px;display:flex;align-items:center;gap:7px;padding:0 10px;flex-shrink:0;
  background:#0a1628;border-bottom:1px solid #1e2d45;
}
.col-title span{font-size:11px;font-weight:700;letter-spacing:.8px}
.sub-tag{font-size:9px;color:#c8e4f8;background:#0f172a;border:1px solid #2a4060;border-radius:3px;padding:1px 5px}

/* 컬럼 헤더 (종목명,코드,등락률... 한번만) */
.tbl-head{
  display:grid;height:20px;padding:0 5px;align-items:center;flex-shrink:0;
  background:#050a15;border-bottom:1px solid #0d1520;
}
.tbl-head span{font-size:9px;font-weight:700;color:#c8e4f8;letter-spacing:.3px}
.tbl-head span:not(:first-child){text-align:right}

/* 스크롤 바디 */
.col-body{overflow-y:auto;flex:1}

/* ══ 섹터 목록 (A/B 두 컬럼) ══ */
.col.sec{border-right:1px solid #1a2d45;background:#060c1a}
#sec-a{border-right:1px solid #1a2d45}
#sec-b{border-right:2px solid #1e3a5f}

/* 섹터 서브헤더 (섹터명) */
.sec-sub{
  display:flex;align-items:center;gap:6px;
  height:24px;padding:0 8px;flex-shrink:0;
  border-bottom:1px solid #0d1520;border-top:1px solid #0d1520;
  position:sticky;top:0;z-index:5;
}
.sec-sub.pos{background:#0d2518}
.sec-sub.neg{background:#22100a}
.sec-rnk{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px;color:#0a0f1e;flex-shrink:0}
.sec-nm{font-size:11px;font-weight:700;color:#e2e8f0}
.sec-chg{margin-left:auto;font-size:12px;font-weight:700}

/* 종목 한줄 (섹터 내부) */
.stk-row{
  display:grid;
  grid-template-columns:95px 54px 46px 56px 70px;
  height:23px;padding:0 8px;align-items:center;
  border-bottom:1px solid #09111e;transition:background .1s;
}
.stk-row:hover{background:#0d1e30}
.stk-nm{font-size:11px;color:#dceef8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp{
  cursor:pointer;user-select:none;font-family:"Courier New",monospace;font-size:9px;
  padding:0 3px;border-radius:2px;border:1px solid #2a4a65;background:#050a14;color:#c8e4f8;
  transition:all .12s;text-align:center;
}
.cp:hover{border-color:#ff444470;color:#ff4444}
.cp.ok{color:#ff4444;border-color:#ff444460}
.chg-v{font-size:11px;font-weight:700;text-align:right}
.vol-v{font-size:10px;color:#c8e4f8;text-align:right}
.amt-v{font-size:10px;color:#c8e4f8;text-align:right}

/* ══ 포착 목록 ══ */
.cap-head{grid-template-columns:105px 52px 46px 72px 90px 84px}
.cap-row{
  display:grid;
  grid-template-columns:105px 52px 46px 72px 90px 84px;
  height:24px;padding:0 8px;align-items:center;
  border-bottom:1px solid #09111e;transition:background .1s;
}
.cap-row:hover{background:#0d1e30}
.cap-row.hit{background:#081510}
.cap-nm{font-size:11px;color:#eef4fa;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hit-b{font-size:7px;font-weight:800;color:#0a0f1e;background:#00d97e;padding:0 3px;border-radius:2px;margin-left:2px;vertical-align:middle}

/* ══ 알람 목록 ══ */
.live-dot{width:7px;height:7px;border-radius:50%;background:#00d97e;box-shadow:0 0 5px #00d97e;animation:pulse 2s infinite}
.alr{padding:6px 12px;border-bottom:1px solid #09111e;transition:background .1s}
.alr:hover{background:#0d1a2a}
.alr.red   {border-left:3px solid #00c070}
.alr.yellow{border-left:3px solid #f59e0b}
.alr.blue  {border-left:3px solid #3b82f6}
.alr-top{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.alr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.alr-dot.red{background:#00d97e}.alr-dot.yellow{background:#fbbf24}.alr-dot.blue{background:#60a5fa}
.alr-ttl{font-size:11px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alr-time{margin-left:auto;font-size:10px;color:#b8ccd8;flex-shrink:0;padding-left:6px}
.alr-body{font-size:10px;color:#cce4f8;line-height:1.6;white-space:pre-wrap}

/* ══ 랭킹 통합 컬럼 ══ */
/* 섹션 구분 헤더 (등락률상위 / 거래량상위 / 조회수상위) */
.rank-sec-title{
  height:26px;display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0;
  border-bottom:1px solid #0d1520;border-top:1px solid #0d1520;
  background:#0a1225;position:sticky;top:0;z-index:5;

.rank-sec-title span{font-size:10px;font-weight:700}
/* 랭킹 종목 한줄 */
.rk-row{

.rk-row:hover{background:#0d1e30}
.rk-no{font-size:10px;font-weight:700;color:#c8e4f8}
.rk-nm{font-size:11px;color:#dceef8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-head{grid-template-columns:20px 100px 54px 48px 58px 80px}
</style>

// ══ 유틸 ════════════════════════════════════════════
const fg=v=>(v>=0?"+":"")+v.toFixed(2)+"%";
const cc=v=>v>0?"#ff4444":v<0?"#00d97e":"#b8ccd8";
const fmt=n=>Number(n).toLocaleString("ko-KR");
const pct=(a,b)=>b>0?((a-b)/b*100):0;
const rnd=(v,d)=>+(v+(Math.random()-.47)*d).toFixed(2);

function cp(el,code){
  try{navigator.clipboard.writeText(code)}catch{}
  const p=el.textContent;el.textContent="✓";el.classList.add("ok");
  setTimeout(()=>{el.textContent=p;el.classList.remove("ok")},1400);
}

// ══ 섹터 렌더 ═══════════════════════════════════════
function renderSectors(){
  const sorted=[...sectors].sort((a,b)=>b.chg-a.chg);
  // A: 홀수 랭크(1,3,5...), B: 짝수 랭크(2,4,6...)
  const a=sorted.filter((_,i)=>i%2===0);
  const b=sorted.filter((_,i)=>i%2!==0);
  document.getElementById("sec-a-body").innerHTML=secHTML(a,0);
  document.getElementById("sec-b-body").innerHTML=secHTML(b,1);
}

function secHTML(list,offset){
  return list.map((sec,li)=>{
    const rank=(li*2)+offset+1;
    const pos=sec.chg>=0, ac=pos?"#ff4444":"#00d97e";
    const ss=[...sec.stocks].sort((a,b)=>b.chg-a.chg);
    return `
      <div class="sec-sub ${pos?"pos":"neg"}">
        <div class="sec-rnk" style="background:${ac}">${rank}</div>
        <span class="sec-nm">${sec.name}</span>
        <span class="sec-chg" style="color:${ac}">${fg(sec.chg)}</span>
      </div>
      ${ss.map(s=>`
        <div class="stk-row">
          <span class="stk-nm">${s.name}</span>
          <button class="cp" onclick="cp(this,'${s.code}')">${s.code}</button>
          <span class="chg-v" style="color:${cc(s.chg)}">${fg(s.chg)}</span>
          <span class="vol-v">${s.vol}</span>
          <span class="amt-v">${s.amt}</span>
        </div>`).join("")}`;
  }).join("");
}

// ══ 포착 렌더 ═══════════════════════════════════════
function renderCapture(){
  const sorted=[...captured].sort((a,b)=>b.chg-a.chg);
  document.getElementById("cap-body").innerHTML=sorted.map(s=>{
    const toT=pct(s.target,s.price), toS=pct(s.price,s.stop);
    return `<div class="cap-row ${s.hit?"hit":""}">
      <span class="cap-nm">${s.name}</span>
      <button class="cp" onclick="cp(this,'${s.code}')">${s.code}</button>
      <span style="font-size:10px;font-weight:700;color:${cc(s.chg)};text-align:right">${fg(s.chg)}</span>
      <span style="font-size:10px;color:#eef4fa;text-align:right">${fmt(s.price)}</span>
      <span style="font-size:10px;color:#60a5fa;text-align:right;white-space:nowrap">${fmt(s.target)}<span style="font-size:8px;color:#3b82f6">(+${toT.toFixed(1)}%)</span></span>
      <span style="font-size:10px;color:#00d97e;text-align:right;white-space:nowrap">${fmt(s.stop)}<span style="font-size:8px;color:#00c070">(-${toS.toFixed(1)}%)</span></span>
    </div>`;
  }).join("");
}

// ══ 알람 렌더 ═══════════════════════════════════════

// ══ 랭킹 통합 렌더 (등락률→거래량→조회수 순서대로 한 컬럼) ══
function renderRanking(){

        <span style="font-size:9px;color:#c8e4f8;text-align:right">${s.vol}</span>
        <span style="font-size:9px;color:#c8e4f8;text-align:right">${s.amt}</span>

// ══ 공휴일 목록 (한국) ══════════════════════════════
const KR_HOLIDAYS = new Set([
  "2026-01-01","2026-01-28","2026-01-29","2026-01-30", // 신정, 설연휴
  "2026-03-01","2026-05-01","2026-05-05","2026-05-25", // 삼일절, 근로자의날, 어린이날, 부처님오신날
  "2026-06-06","2026-08-15",                           // 현충일, 광복절
  "2026-09-24","2026-09-25","2026-09-26",              // 추석연휴
  "2026-10-03","2026-10-09","2026-12-25",              // 개천절, 한글날, 크리스마스
]);

// ══ 장 상태 계산 ════════════════════════════════════
function getMarketStatus(){
  const now = new Date();
  const dow  = now.getDay();        // 0=일, 6=토
  const ymd  = now.toISOString().slice(0,10);
  const hhmm = now.getHours()*100 + now.getMinutes();
  // 주말/공휴일
  if(dow===0 || dow===6 || KR_HOLIDAYS.has(ymd)){
    return {text:"🔴 휴장", color:"#f87171", bg:"#f8717115", border:"#f8717130"};
  }
  if(hhmm >= 800  && hhmm < 900)
    return {text:"🟡 장전 (NXT)", color:"#fbbf24", bg:"#fbbf2415", border:"#fbbf2430"};
  if(hhmm >= 900  && hhmm < 1530)
    return {text:"🟢 장 운영중",  color:"#00d97e", bg:"#00d97e15", border:"#00d97e30"};
  if(hhmm >= 1530 && hhmm < 2000)
    return {text:"🟡 장후 (NXT)", color:"#fbbf24", bg:"#fbbf2415", border:"#fbbf2430"};
  return {text:"🔴 장 마감", color:"#f87171", bg:"#f8717115", border:"#f8717130"};
}

function updateMarketBadge(){
  const s = getMarketStatus();
  const el = document.getElementById("mkt-badge");
  if(!el) return;
  el.textContent = s.text;
  el.style.color  = s.color;
  el.style.background = s.bg;
  el.style.borderColor = s.border;
}

// ══ 다음 영업일 계산 (항상 내일 이후) ═══════════════
function getNextBizDay(){
  const DAYS=["일","월","화","수","목","금","토"];
  // 항상 내일부터 탐색
  const d = new Date();
  d.setDate(d.getDate()+1);
  d.setHours(0,0,0,0);
  for(let i=0;i<14;i++){
    const dow = d.getDay();
    const ymd = d.toISOString().slice(0,10);
    if(dow!==0 && dow!==6 && !KR_HOLIDAYS.has(ymd)){
      return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[dow]})`;
    }
    d.setDate(d.getDate()+1);
  }
  return "--";
}

// ══ 실데이터 폴링 (/api/data 10초마다) ══════════════
async function fetchAndRender(){
  try{
    const res = await fetch('/api/data');
    if(!res.ok) throw new Error(res.status);
    const d = await res.json();
    // 실데이터가 있을 때만 교체 (목업 덮어쓰기 방지)
    if(d.sectors   && d.sectors.length)   sectors  = d.sectors;
    if(d.captured  && d.captured.length)  captured = d.captured;
    if(d.alerts    && d.alerts.length)    alerts   = d.alerts;
    if(d.rank_chg  && d.rank_chg.length)  rChg     = d.rank_chg;
    if(d.rank_vol  && d.rank_vol.length)  rVol     = d.rank_vol;
    if(d.rank_view && d.rank_view.length) rView    = d.rank_view;
    // 헤더 갱신
    if(d.next_biz_day) document.getElementById("next-biz").textContent = d.next_biz_day;
    if(d.updated_at)   document.getElementById("ts").textContent = d.updated_at;
    renderAll();
  }catch(e){
    console.warn("fetch /api/data 실패:", e);
  }
}
function renderAll(){
  renderSectors();renderCapture();renderAlerts();renderRanking();
}

// ══ 초기화 ══════════════════════════════════════════
updateMarketBadge();
document.getElementById("next-biz").textContent = getNextBizDay();
fetchAndRender();
setInterval(fetchAndRender, 10000);

name: Stock Alert Bot (cron)

on:
  workflow_dispatch:
  schedule:
    # KST 08:00~20:00 ~= UTC 23:00~11:00
    # Run every 3 minutes on weekdays. Code also skips weekends.
    - cron: "*/3 23 * * 0-4"
    - cron: "*/3 0-11 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot (single cycle)
        env:
          KIS_APPKEY: ${{ secrets.KIS_APPKEY }}
          KIS_APPSECRET: ${{ secrets.KIS_APPSECRET }}
          KIS_ACCTNO: ${{ secrets.KIS_ACCTNO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BOT_STATE_DIR: ".state"
        run: |
          python stock_alert.py
